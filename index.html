<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E8DFD5" />

    <!-- SEO -->
    <title>Saeiris — Luxury Travel Planning & Analog Film Photography</title>
    <meta name="description" content="Saeiris offers bespoke international trip planning combined with a unique analog photography experience. Every journey captured on a 1976 Canon AE-1." />

    <!-- Open Graph (link previews on iMessage, WhatsApp, Instagram, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://saeiris.com" />
    <meta property="og:title" content="Saeiris — Luxury Travel Planning & Analog Film Photography" />
    <meta property="og:description" content="Bespoke international trip planning combined with a unique analog photography experience. Every journey captured on a 1976 Canon AE-1." />
    <meta property="og:image" content="https://saeiris.com/hero-bg.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Saeiris — Luxury Travel Planning & Analog Film Photography" />
    <meta name="twitter:description" content="Bespoke international trip planning combined with a unique analog photography experience. Every journey captured on a 1976 Canon AE-1." />
    <meta name="twitter:image" content="https://saeiris.com/hero-bg.png" />

    <style>
      /* iOS 26 Safari ("Liquid Glass") ignores theme-color and instead samples the
         document's background-color to tint the status bar and URL bar. With no root
         color set, it falls back to white — the bars you were seeing. Set an explicit
         warm base here so the chrome is never white, even before React mounts, and
         stop the rubber-band overscroll from exposing the root color. */
      html, body {
        background-color: #E8DFD5;
        overscroll-behavior-y: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
