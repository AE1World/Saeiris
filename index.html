<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E8DFD5" />
    <style>
      /* iOS 26 Safari ("Liquid Glass") ignores theme-color and instead samples the
         document's background-color to tint the status bar and URL bar. With no root
         color set, it falls back to white — the bars you were seeing. Set an explicit
         warm base here so the chrome is never white, even before React mounts, and
         stop the rubber-band overscroll from exposing the root color. */
      html, body {
        background-color: #E8DFD5;
        overscroll-behavior-y: none;
      }
    </style>
    <title>Saeiris</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
